<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pejuang Mimpi | Menu</title>

    <!-- OneSignal Push Notification SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          await OneSignal.init({
            appId: "8b3fdb5b-f137-41cd-99d7-d99d709bcd7e",
            safari_web_id: "web.onesignal.auto.05737452-6fb0-4a74-aaf2-b68bc5a2ed6a",
            allowLocalhostAsSecureOrigin: true,
            notifyButton: {
              enable: true,
            },
          });
          console.log("[OneSignal] Inisialisasi Berhasil.");

          // Attempt Slidedown prompt or Notifications permission request
          if (window.Notification && Notification.permission !== "granted") {
            if (OneSignal.Slidedown) {
              await OneSignal.Slidedown.promptPush();
            } else if (OneSignal.Notifications) {
              await OneSignal.Notifications.requestPermission();
            }
          }
        } catch (err) {
          console.error("[OneSignal] Gagal Inisialisasi:", err);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
